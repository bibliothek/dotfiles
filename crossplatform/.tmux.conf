# Tmux Configuration

# Set prefix key (optional, default is C-b)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Enable true color (24-bit)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",wezterm:Tc"

# ----------------------------
# Pane Navigation (Alt + hjkl)
# ----------------------------
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# ----------------------------
# TPM (Tmux Plugin Manager)
# ----------------------------
# Install TPM if not present:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

# ----------------------------
# Which-Key Configuration
# ----------------------------
# tmux-which-key shows available keybindings after pressing prefix
# Default trigger is prefix + ? but the plugin enhances this experience

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

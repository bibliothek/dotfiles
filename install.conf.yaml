- defaults:
    link:
      relink: true
      force: true

- link:
    ~/.ideavimrc: crossplatform/.ideavimrc
    ~/.wezterm.lua: crossplatform/.wezterm.lua
    ~/martin-paradox.omp.json: crossplatform/martin-paradox.omp.json
    ~/.config/atuin/config.toml: 
      path: crossplatform/atuin
    ~/Documents/PowerShell/Microsoft.PowerShell_profile.ps1:
      path: crossplatform/profile.ps1
      if: ver
    ~/.zshrc:
      path: linux/.zshrc
      if: '[ "$(uname -s)" = "Linux" ] || [ "$(uname -s)" = "Darwin" ]'
